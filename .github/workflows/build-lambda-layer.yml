name: Build and Deploy Lambda Layer

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      aws_account_id:
        description: 'AWS account ID where the layer will be published'
        required: true
      aws_region:
        description: 'AWS region'
        required: false
        default: 'us-east-1'
      runner_project:
        description: 'CodeBuild runner project name (e.g. codebuild-my-org-runner)'
        required: true
      layer_name:
        description: 'Lambda layer name'
        required: false
        default: 'kalbio'
      organization_id:
        description: 'AWS org ID for layer permission (optional; omit to skip org-wide grant)'
        required: false
      iac_repository:
        description: 'IaC repo to update with layer version (owner/repo; omit to skip)'
        required: false
      iac_ref:
        description: 'IaC branch/tag to update'
        required: false
        default: 'main'
      iac_config_path:
        description: 'Path within IaC repo to config file directory, e.g., src/cdk'
        required: false
        default: ''
      iac_config_file:
        description: 'Config filename to update (within iac_config_path,) e.g., myconf.yml'
        required: false
        default: ''

jobs:
  build-and-deploy:
    runs-on: ${{ format('{0}-{1}-{2}', inputs.runner_project, github.run_id, github.run_attempt) }}
    env:
      AWS_ACCOUNT: ${{ inputs.aws_account_id }}
      AWS_REGION: ${{ inputs.aws_region }}
      LAYER_NAME: ${{ inputs.layer_name }}
    outputs:
      VERSION: ${{ steps.deploy.outputs.VERSION }}
    steps:
      - name: Checkout kalbio
        uses: actions/checkout@v4

      - name: Install Python
        run: |
          pyenv versions
          pyenv global 3.10.14
          python --version

      - name: Build Lambda Layer
        run: |
          mkdir -p aws-layer/python/lib/python3.10/site-packages
          python -m pip install . -q --upgrade --target aws-layer/python/lib/python3.10/site-packages/ --platform manylinux2014_x86_64 --implementation cp --python-version 3.10
          cd aws-layer
          rm -rf python/lib/python3.10/site-packages/boto*
          rm -rf python/lib/python3.10/site-packages/urllib3*
          find . -type d -name "__pycache__" | xargs rm -rf
          find . -type d -name "test*" | xargs rm -rf
          zip -q -r9 lambda-layer.zip .
          unzip -l lambda-layer.zip

      - name: Deploy Lambda Layer and Grant permissions
        id: deploy
        run: |
          cd aws-layer
          PUBLISH=$(aws lambda publish-layer-version --layer-name ${{ env.LAYER_NAME }} --zip-file fileb://lambda-layer.zip --compatible-runtimes python3.10 --region ${{ env.AWS_REGION }})
          VERSION=$(echo $PUBLISH|jq -r .Version)
          if [ -n "${{ inputs.organization_id }}" ]; then
            aws lambda add-layer-version-permission --layer-name ${{ env.LAYER_NAME }} --version-number ${VERSION} --statement-id allOrganizationAccounts --principal "*" --organization-id ${{ inputs.organization_id }} --action lambda:GetLayerVersion --region ${{ env.AWS_REGION }}
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

  update-iac:
    if: ${{ inputs.iac_repository != '' }}
    runs-on: ${{ format('{0}-{1}-{2}', inputs.runner_project, github.run_id, github.run_attempt) }}
    needs: [build-and-deploy]
    permissions:
      contents: write
    env:
      AWS_ACCOUNT: ${{ inputs.aws_account_id }}
      AWS_REGION: ${{ inputs.aws_region }}
      LAYER_NAME: ${{ inputs.layer_name }}
    steps:
      - name: Checkout IaC
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.iac_repository }}
          path: iac-repo
          ref: ${{ inputs.iac_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Update IaC
        run: |
          cd iac-repo/${{ inputs.iac_config_path }}
          CONFIG_FILE="${{ inputs.iac_config_file }}"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Config file $CONFIG_FILE not found in ${{ inputs.iac_config_path }}"
            exit 1
          fi
          echo "Setting layer arn to arn:aws:lambda:${{ env.AWS_REGION }}:${{ env.AWS_ACCOUNT }}:layer:${{ env.LAYER_NAME }}"
          sed -i "s/arn:aws:lambda:${{ env.AWS_REGION }}:[[:digit:]]*:layer:${{ env.LAYER_NAME }}/arn:aws:lambda:${{ env.AWS_REGION }}:${{ env.AWS_ACCOUNT }}:layer:${{ env.LAYER_NAME }}/" "$CONFIG_FILE"
          echo "Setting layer version to ${{ env.LAYER_NAME }}:${{ needs.build-and-deploy.outputs.VERSION }}"
          sed -i "s/${{ env.LAYER_NAME }}:[[:digit:]]*/${{ env.LAYER_NAME }}:${{ needs.build-and-deploy.outputs.VERSION }}/g" "$CONFIG_FILE"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add "$CONFIG_FILE"
          git diff --staged --quiet || git commit -m "bump ${{ env.LAYER_NAME }} layer version to ${{ needs.build-and-deploy.outputs.VERSION }} and account to ${{ env.AWS_ACCOUNT }}"
          git push origin ${{ inputs.iac_ref }}
